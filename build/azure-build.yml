# trigger:
# - main

variables:
    BuildConfiguration: Release
    DotNetVersion: 10.0.103
    VSVERSION: 2022

stages:
- stage: BuildAndroid
  jobs:
  - job: BuildMAUIApps
    displayName: Build MAUI App
    pool:
      vmImage: 'windows-2022'
      demands:
      - MSBuild

    steps:

    - task: UseDotNet@2
      displayName: Install .NET $(DotNetVersion)
      inputs:
        packageType: 'sdk'
        version: '$(DotNetVersion)'

    - task: PowerShell@2
      displayName: Restore .NET MAUI Workloads
      inputs:
        targetType: 'inline'
        script: |
          & dotnet nuget locals all --clear
          & dotnet workload restore src/ThymeToPlant/ThymeToPlant.sln

    - task: Bash@3
      displayName: Run Unit Test
      inputs:
        targetType: 'inline'
        script: |
          dotnet test src/ThymeToPlant/ThymeToTest/ThymeToTest.csproj --logger trx --configuration Debug --collect:"XPlat Code Coverage"

    - task: PublishTestResults@2
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: 'VSTest'
        testResultsFiles: |
          **/testResults.trx
          **/*.trx

     # Publish code coverage report to the pipeline
    - task: PublishCodeCoverageResults@2
      condition: succeededOrFailed()
      displayName: 'Publish code coverage'
      inputs:
        summaryFileLocation: $(System.DefaultWorkingDirectory)/**/*.cobertura.xml

  # https://docs.microsoft.com/en-us/dotnet/maui/android/deployment/overview
    - task: Bash@3
      displayName: Build Android App
      inputs:
        targetType: 'inline'
        script: |
          dotnet publish src/ThymeToPlant/ThymeToPlant/ThymeToPlant.csproj -f net10.0-android -c Release

    # Signing Android App : https://docs.microsoft.com/en-us/azure/devops/pipelines/apps/mobile/app-signing?view=azure-devops&tabs=apple-install-during-build#sign-your-android-app

    - task: CopyFiles@2
      inputs:
        Contents: |
          src/ThymeToPlant/ThymeToPlant\bin\Release\net10.0-android\publish\*.apk
        TargetFolder: '$(Build.ArtifactStagingDirectory)'


  #   # https://docs.microsoft.com/en-us/dotnet/maui/windows/deployment/overview
    - task: PowerShell@2
      displayName: Build Windows MSIX
      inputs:
        targetType: 'inline'
        script: |
          dotnet publish src/ThymeToPlant/ThymeToPlant/ThymeToPlant.csproj -f net10.0-windows10.0.19041.0 -c Release

    - task: CopyFiles@2
      inputs:
        Contents: |
          src/ThymeToPlant/ThymeToPlant\bin\Release\net10.0-windows10.0.19041.0\win10-x64/**/*.msix
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop_artifacts'
        publishLocation: 'Container'
